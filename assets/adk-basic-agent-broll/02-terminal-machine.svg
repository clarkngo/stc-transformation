<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 280" role="img" aria-labelledby="t2">
  <title id="t2">Terminal: python version and cwd</title>
  <defs>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#e2e8f0"/>
  <rect x="20" y="20" width="600" height="240" rx="12" fill="url(#g2)" stroke="#334155" stroke-width="2"/>
  <text x="36" y="48" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace" font-size="12">B-roll: machine layer</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#e2e8f0">
    <text x="36" y="88" fill="#64748b">$ pwd</text>
    <text x="36" y="112" fill="#7dd3fc">~/projects/basic-agent</text>
    <text x="36" y="152" fill="#64748b">$ which python</text>
    <text x="36" y="176" fill="#86efac">.venv/bin/python</text>
    <text x="36" y="216" fill="#64748b">$ python --version</text>
    <text x="36" y="240" fill="#86efac">Python 3.12.2</text>
  </g>
</svg>
