<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" role="img" aria-labelledby="t3">
  <title id="t3">.env redacted + project selector</title>
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  <text x="24" y="32" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">B-roll: secrets and project</text>
  <rect x="24" y="48" width="340" height="188" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="40" y="76" fill="#0f172a" font-family="ui-monospace,Menlo,monospace" font-size="12" font-weight="700">.env</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="11" fill="#334155">
    <text x="40" y="108">GOOGLE_API_KEY=<tspan fill="#94a3b8">****************</tspan></text>
    <text x="40" y="134">GOOGLE_CLOUD_PROJECT=<tspan fill="#94a3b8">********</tspan></text>
    <text x="40" y="160"># never commit real keys</text>
    <text x="40" y="196" fill="#0ea5e9" font-size="10">load_order: shell -&gt; .env -&gt; app</text>
  </g>
  <rect x="384" y="48" width="312" height="188" rx="10" fill="#fff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="400" y="76" fill="#0f172a" font-family="system-ui,sans-serif" font-size="12" font-weight="700">Google Cloud console</text>
  <rect x="400" y="92" width="280" height="36" rx="6" fill="#f8fafc" stroke="#94a3b8"/>
  <text x="412" y="115" fill="#0f172a" font-family="system-ui,sans-serif" font-size="11">Project: <tspan font-weight="700">my-adk-tutorial (v)</tspan></text>
  <text x="400" y="156" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">IAM, APIs, billing follow this selection</text>
  <rect x="400" y="176" width="120" height="28" rx="6" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="412" y="195" fill="#0369a1" font-family="system-ui,sans-serif" font-size="10" font-weight="600">Select project</text>
</svg>
