<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" role="img" aria-labelledby="t4">
  <title id="t4">Minimal Example 1 style file tree</title>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="20" y="34" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">B-roll: runtime layer (repo shape)</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="13" fill="#1e293b">
    <text x="20" y="72" fill="#0ea5e9" font-weight="700">basic_agent/</text>
    <text x="44" y="100">|-- .env</text>
    <text x="44" y="128">|-- requirements.txt</text>
    <text x="44" y="156">`-- <tspan fill="#0369a1" font-weight="700">agent.py</tspan>  <tspan fill="#64748b" font-size="11">ADK runtime wiring</tspan></text>
    <text x="20" y="200" fill="#64748b" font-size="11">(illustrative names; map files to stack stations)</text>
  </g>
  <rect x="20" y="228" width="480" height="72" rx="8" fill="#fff" stroke="#e2e8f0"/>
  <text x="36" y="256" fill="#475569" font-family="ui-monospace,Menlo,monospace" font-size="10"># agent.py - LlmAgent, model id, instructions...</text>
  <text x="36" y="278" fill="#94a3b8" font-family="ui-monospace,Menlo,monospace" font-size="10">from google.adk.agents import LlmAgent</text>
</svg>
