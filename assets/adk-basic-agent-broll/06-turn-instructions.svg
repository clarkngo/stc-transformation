<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 240" role="img" aria-labelledby="t6">
  <title id="t6">System instruction + user turn</title>
  <rect width="100%" height="100%" fill="#f1f5f9"/>
  <text x="24" y="32" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">B-roll: turn layer</text>
  <rect x="24" y="52" width="632" height="64" rx="10" fill="#eef2ff" stroke="#818cf8" stroke-width="1.5"/>
  <text x="40" y="78" fill="#4338ca" font-family="system-ui,sans-serif" font-size="10" font-weight="800" letter-spacing="0.06em">SYSTEM</text>
  <text x="40" y="100" fill="#312e81" font-family="system-ui,sans-serif" font-size="11">You are a concise tutor. Reply in three bullets max.</text>
  <rect x="24" y="132" width="632" height="84" rx="10" fill="#fff" stroke="#94a3b8"/>
  <text x="40" y="158" fill="#0369a1" font-family="system-ui,sans-serif" font-size="10" font-weight="800" letter-spacing="0.06em">USER</text>
  <text x="40" y="182" fill="#0f172a" font-family="system-ui,sans-serif" font-size="12">What is ADK in one sentence?</text>
  <text x="40" y="204" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Prove plumbing first with a tiny message, then grow the task.</text>
</svg>
