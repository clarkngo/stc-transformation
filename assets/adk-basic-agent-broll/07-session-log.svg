<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-labelledby="t7">
  <title id="t7">Session / turn log</title>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="20" y="32" fill="#64748b" font-family="system-ui,sans-serif" font-size="12">B-roll: session continuity</text>
  <rect x="20" y="48" width="600" height="192" rx="10" fill="#fff" stroke="#e2e8f0"/>
  <text x="36" y="78" fill="#0f172a" font-family="system-ui,sans-serif" font-size="11" font-weight="700">session transcript (sample)</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="11">
    <text x="36" y="112" fill="#64748b">turn 1</text>
    <text x="100" y="112" fill="#334155">user: &quot;hello&quot;</text>
    <text x="36" y="138" fill="#64748b">turn 1</text>
    <text x="100" y="138" fill="#059669">assistant: &quot;Hi! ...&quot;</text>
    <text x="36" y="164" fill="#64748b">turn 2</text>
    <text x="100" y="164" fill="#334155">user: &quot;summarize last turn&quot;</text>
    <text x="36" y="190" fill="#64748b">meta</text>
    <text x="100" y="190" fill="#94a3b8">state, tool results, tokens... (slot exists even if empty)</text>
  </g>
</svg>
