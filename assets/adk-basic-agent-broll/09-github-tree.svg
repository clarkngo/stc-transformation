<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-labelledby="t9">
  <title id="t9">GitHub-style tree, Example 1</title>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <rect x="0" y="0" width="560" height="44" fill="#f6f8fa" stroke="#d0d7de"/>
  <circle cx="22" cy="22" r="8" fill="#24292f"/>
  <text x="40" y="27" fill="#24292f" font-family="ui-sans-serif,system-ui,sans-serif" font-size="13" font-weight="600">agent-development-kit-crash-course</text>
  <text x="20" y="72" fill="#57606a" font-family="ui-sans-serif,sans-serif" font-size="11">B-roll: Example #1 Basic Agent</text>
  <g font-family="ui-monospace,Menlo,monospace" font-size="12" fill="#24292f">
    <text x="20" y="108" fill="#0969da">examples/</text>
    <text x="44" y="132">|-- basic_agent/</text>
    <text x="68" y="156">|   |-- README.md</text>
    <text x="68" y="180">|   |-- requirements.txt</text>
    <text x="68" y="204">|   `-- main.py</text>
  </g>
  <rect x="20" y="232" width="520" height="88" rx="6" fill="#fff8c5" stroke="#d4a72c"/>
  <text x="36" y="260" fill="#4d2d00" font-family="ui-sans-serif,sans-serif" font-size="10">Point at each file: which <tspan font-weight="700">stack station</tspan> does it primarily feed?</text>
  <text x="36" y="282" fill="#6b5900" font-family="ui-monospace,Menlo,monospace" font-size="10">Repo URL in video description - tree is illustrative.</text>
