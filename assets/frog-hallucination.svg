<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 480" width="860" height="480" font-family="'Inter',system-ui,-apple-system,sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
    <filter id="shadow2" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="480" fill="#f1f5f9" rx="16"/>

  <!-- ══ LEFT PANEL: Police Report ══ -->
  <rect x="32" y="32" width="390" height="416" fill="white" rx="12" filter="url(#shadow)"/>

  <!-- Report header -->
  <rect x="32" y="32" width="390" height="52" fill="#0f172a" rx="12"/>
  <rect x="32" y="68" width="390" height="16" fill="#0f172a"/>
  <text x="227" y="63" text-anchor="middle" fill="white" font-size="13" font-weight="700" letter-spacing="2">HEBER CITY POLICE DEPARTMENT</text>
  <text x="227" y="76" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.5">INCIDENT REPORT — AI-GENERATED NARRATIVE</text>

  <!-- Report body — normal lines -->
  <rect x="52" y="100" width="180" height="8" fill="#e2e8f0" rx="3"/>
  <rect x="52" y="116" width="310" height="6" fill="#f1f5f9" rx="2"/>
  <rect x="52" y="130" width="280" height="6" fill="#f1f5f9" rx="2"/>
  <rect x="52" y="144" width="300" height="6" fill="#f1f5f9" rx="2"/>

  <rect x="52" y="166" width="160" height="8" fill="#e2e8f0" rx="3"/>
  <rect x="52" y="182" width="310" height="6" fill="#f1f5f9" rx="2"/>
  <rect x="52" y="196" width="290" height="6" fill="#f1f5f9" rx="2"/>
  <rect x="52" y="210" width="305" height="6" fill="#f1f5f9" rx="2"/>

  <!-- AI section label -->
  <rect x="52" y="232" width="350" height="24" fill="#eff6ff" rx="5"/>
  <rect x="52" y="232" width="6" height="24" fill="#1d4ed8" rx="3"/>
  <text x="66" y="248" fill="#1d4ed8" font-size="9.5" font-weight="700" letter-spacing="0.8">AI-GENERATED NARRATIVE (AXON DRAFT ONE)</text>

  <!-- Normal AI lines -->
  <rect x="52" y="264" width="310" height="6" fill="#f1f5f9" rx="2"/>
  <rect x="52" y="278" width="295" height="6" fill="#f1f5f9" rx="2"/>
  <rect x="52" y="292" width="300" height="6" fill="#f1f5f9" rx="2"/>

  <!-- THE PROBLEM LINE — red highlight -->
  <rect x="48" y="310" width="358" height="44" fill="#fef2f2" rx="6" stroke="#dc2626" stroke-width="1.5"/>
  <rect x="48" y="310" width="5" height="44" fill="#dc2626" rx="3"/>
  <text x="62" y="326" fill="#dc2626" font-size="9" font-weight="700">⚠  AI OUTPUT:</text>
  <text x="62" y="340" fill="#991b1b" font-size="10.5" font-weight="600" font-style="italic">"...suspect shape-shifted into a frog</text>
  <text x="62" y="354" fill="#991b1b" font-size="10.5" font-weight="600" font-style="italic">and fled northbound on 3rd Ave..."</text>

  <!-- More lines -->
  <rect x="52" y="364" width="290" height="6" fill="#f1f5f9" rx="2"/>
  <rect x="52" y="378" width="270" height="6" fill="#f1f5f9" rx="2"/>

  <!-- Signature -->
  <line x1="52" y1="410" x2="220" y2="410" stroke="#cbd5e1" stroke-width="1"/>
  <text x="52" y="421" fill="#94a3b8" font-size="8">Officer Signature</text>
  <line x1="250" y1="410" x2="380" y2="410" stroke="#cbd5e1" stroke-width="1"/>
  <text x="250" y="421" fill="#94a3b8" font-size="8">Date</text>

  <!-- SIGNED stamp -->
  <rect x="268" y="384" width="78" height="22" fill="none" stroke="#16a34a" stroke-width="2" rx="3" transform="rotate(-8 307 395)"/>
  <text x="307" y="399" text-anchor="middle" fill="#16a34a" font-size="11" font-weight="800" letter-spacing="1.5" transform="rotate(-8 307 395)">SIGNED</text>

  <!-- Connecting arrow -->
  <path d="M 422 334 Q 437 334 448 334" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arrowhead)"/>

  <!-- ══ RIGHT PANEL: Night Scene ══ -->
  <rect x="452" y="32" width="376" height="416" fill="#0f172a" rx="12"/>

  <!-- Ground / street -->
  <rect x="452" y="350" width="376" height="98" fill="#1e293b" rx="0"/>
  <rect x="452" y="428" width="376" height="20" fill="#1e293b" rx="0 0 12 12"/>
  <!-- Road markings -->
  <rect x="540" y="375" width="50" height="7" fill="#fbbf24" rx="2" opacity="0.4"/>
  <rect x="610" y="375" width="50" height="7" fill="#fbbf24" rx="2" opacity="0.4"/>
  <rect x="680" y="375" width="50" height="7" fill="#fbbf24" rx="2" opacity="0.4"/>
  <rect x="750" y="375" width="50" height="7" fill="#fbbf24" rx="2" opacity="0.4"/>

  <!-- Stars -->
  <circle cx="475" cy="58" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="510" cy="45" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="555" cy="70" r="1.4" fill="white" opacity="0.6"/>
  <circle cx="600" cy="52" r="1" fill="white" opacity="0.4"/>
  <circle cx="645" cy="65" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="695" cy="48" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="740" cy="72" r="1.4" fill="white" opacity="0.6"/>
  <circle cx="785" cy="55" r="1" fill="white" opacity="0.4"/>
  <circle cx="815" cy="80" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="495" cy="90" r="0.8" fill="white" opacity="0.3"/>
  <circle cx="820" cy="110" r="0.8" fill="white" opacity="0.3"/>

  <!-- Street light -->
  <rect x="576" y="170" width="5" height="180" fill="#334155"/>
  <rect x="562" y="165" width="32" height="10" fill="#475569" rx="2"/>
  <ellipse cx="578" cy="168" rx="18" ry="5" fill="#fef9c3" opacity="0.95"/>
  <ellipse cx="578" cy="235" rx="55" ry="28" fill="#fef3c7" opacity="0.04"/>

  <!-- Police cruiser -->
  <rect x="458" y="310" width="130" height="46" fill="#1d4ed8" rx="7"/>
  <rect x="468" y="297" width="110" height="22" fill="#2563eb" rx="5"/>
  <!-- Windows -->
  <rect x="476" y="300" width="42" height="15" fill="#bfdbfe" rx="2" opacity="0.75"/>
  <rect x="528" y="300" width="42" height="15" fill="#bfdbfe" rx="2" opacity="0.75"/>
  <!-- Light bar -->
  <rect x="476" y="292" width="94" height="8" fill="#1e40af" rx="4"/>
  <rect x="476" y="292" width="30" height="8" fill="#ef4444" rx="3" opacity="0.95"/>
  <rect x="540" y="292" width="30" height="8" fill="#60a5fa" rx="3" opacity="0.95"/>
  <!-- Wheels -->
  <circle cx="490" cy="358" r="12" fill="#0f172a"/>
  <circle cx="490" cy="358" r="5" fill="#475569"/>
  <circle cx="570" cy="358" r="12" fill="#0f172a"/>
  <circle cx="570" cy="358" r="5" fill="#475569"/>

  <!-- Officer — arms raised in shock -->
  <!-- Legs -->
  <rect x="607" y="328" width="12" height="24" fill="#111827" rx="3"/>
  <rect x="623" y="328" width="12" height="24" fill="#111827" rx="3"/>
  <!-- Body -->
  <rect x="604" y="272" width="34" height="60" fill="#1d4ed8" rx="7"/>
  <!-- Belt -->
  <rect x="604" y="318" width="34" height="6" fill="#111827"/>
  <!-- Left arm — raised -->
  <line x1="606" y1="288" x2="582" y2="262" stroke="#1d4ed8" stroke-width="10" stroke-linecap="round"/>
  <circle cx="579" cy="259" r="7" fill="#fcd9b6"/>
  <!-- Right arm — raised -->
  <line x1="636" y1="288" x2="660" y2="262" stroke="#1d4ed8" stroke-width="10" stroke-linecap="round"/>
  <circle cx="663" cy="259" r="7" fill="#fcd9b6"/>
  <!-- Head -->
  <circle cx="621" cy="258" r="17" fill="#fcd9b6"/>
  <!-- Cap -->
  <rect x="605" y="243" width="32" height="10" fill="#0f172a" rx="2"/>
  <rect x="607" y="238" width="28" height="8" fill="#1d4ed8" rx="2"/>
  <!-- Shocked eyes — wide open -->
  <circle cx="614" cy="257" r="5" fill="white"/>
  <circle cx="628" cy="257" r="5" fill="white"/>
  <circle cx="615" cy="258" r="2.5" fill="#111"/>
  <circle cx="629" cy="258" r="2.5" fill="#111"/>
  <circle cx="614" cy="255" r="1" fill="white" opacity="0.9"/>
  <circle cx="628" cy="255" r="1" fill="white" opacity="0.9"/>
  <!-- Open mouth (O shape) -->
  <ellipse cx="621" cy="268" rx="4.5" ry="4" fill="#7f1d1d"/>
  <ellipse cx="621" cy="267" rx="3" ry="2.5" fill="#991b1b"/>
  <!-- Sweat drops -->
  <ellipse cx="638" cy="248" rx="2" ry="3" fill="#93c5fd" opacity="0.7"/>
  <ellipse cx="641" cy="256" rx="1.5" ry="2.5" fill="#93c5fd" opacity="0.5"/>

  <!-- ══ THE FROG ══ -->
  <!-- Spotlight glow -->
  <ellipse cx="748" cy="342" rx="58" ry="22" fill="#22c55e" opacity="0.10"/>
  <!-- Body shadow -->
  <ellipse cx="748" cy="358" rx="38" ry="10" fill="#052e16" opacity="0.35"/>
  <!-- Frog body -->
  <ellipse cx="748" cy="330" rx="44" ry="33" fill="#15803d"/>
  <ellipse cx="748" cy="324" rx="38" ry="27" fill="#22c55e"/>
  <!-- Belly -->
  <ellipse cx="748" cy="336" rx="24" ry="19" fill="#dcfce7" opacity="0.6"/>
  <!-- Back legs -->
  <path d="M 792 345 Q 812 352 822 366 Q 810 372 798 360 Q 796 372 804 380" stroke="#16a34a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M 704 345 Q 684 352 674 366 Q 686 372 698 360 Q 700 372 692 380" stroke="#16a34a" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Eyes (bulging) -->
  <circle cx="728" cy="306" r="14" fill="#16a34a"/>
  <circle cx="728" cy="306" r="11" fill="#f0fdf4"/>
  <circle cx="728" cy="306" r="7" fill="#166534"/>
  <circle cx="728" cy="306" r="3.5" fill="#052e16"/>
  <circle cx="725" cy="303" r="2" fill="white" opacity="0.8"/>
  <circle cx="768" cy="306" r="14" fill="#16a34a"/>
  <circle cx="768" cy="306" r="11" fill="#f0fdf4"/>
  <circle cx="768" cy="306" r="7" fill="#166534"/>
  <circle cx="768" cy="306" r="3.5" fill="#052e16"/>
  <circle cx="765" cy="303" r="2" fill="white" opacity="0.8"/>
  <!-- Smug smile -->
  <path d="M 730 340 Q 748 352 766 340" stroke="#15803d" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Crown (smug royalty) -->
  <polygon points="732,296 737,282 742,294 748,280 754,294 759,282 764,296" fill="#fbbf24"/>
  <rect x="732" y="292" width="32" height="6" fill="#f59e0b" rx="1"/>
  <circle cx="748" cy="281" r="3" fill="#ef4444"/>
  <circle cx="737" cy="283" r="2" fill="#ef4444"/>
  <circle cx="759" cy="283" r="2" fill="#ef4444"/>

  <!-- Speech bubble -->
  <rect x="668" y="228" width="172" height="46" fill="white" rx="10" filter="url(#shadow2)"/>
  <polygon points="718,274 730,288 742,274" fill="white"/>
  <text x="754" y="249" text-anchor="middle" fill="#15803d" font-size="10" font-weight="700">"I did NOT shape-shift.</text>
  <text x="754" y="264" text-anchor="middle" fill="#15803d" font-size="10" font-weight="700">The AI lied. 🐸"</text>

  <!-- AI Hallucination badge -->
  <rect x="456" y="38" width="130" height="22" fill="#dc2626" rx="11"/>
  <text x="521" y="53" text-anchor="middle" fill="white" font-size="10" font-weight="700" letter-spacing="0.5">AI HALLUCINATION</text>

  <!-- Caption at bottom -->
  <text x="430" y="471" text-anchor="middle" fill="#64748b" font-size="10.5" font-weight="500">Real case: Heber City, Utah — AI-generated police report mistakenly claimed an officer shapeshifted into a frog</text>

</svg>
