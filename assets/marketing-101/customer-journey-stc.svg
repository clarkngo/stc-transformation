<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" role="img" aria-labelledby="tjr">
  <title id="tjr">Customer journey for a School of Technology: stages from awareness through alumni loop</title>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="450" y="32" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="17" font-weight="700">Customer journey (higher-ed SoT)</text>
  <text x="450" y="54" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Linear stages + alumni feeding the next cohort (dashed loop)</text>
  <g font-family="system-ui,sans-serif" font-size="9" font-weight="700" fill="#0f172a">
    <rect x="28" y="88" width="118" height="72" rx="10" fill="#fff" stroke="#0369a1" stroke-width="2"/>
    <text x="87" y="118" text-anchor="middle">AWARENESS</text>
    <text x="87" y="136" text-anchor="middle" fill="#64748b" font-size="7" font-weight="600">Search, content, events</text>
    <rect x="162" y="88" width="118" height="72" rx="10" fill="#fff" stroke="#0369a1" stroke-width="2"/>
    <text x="221" y="118" text-anchor="middle">CONSIDER</text>
    <text x="221" y="136" text-anchor="middle" fill="#64748b" font-size="7" font-weight="600">Compare, info session</text>
    <rect x="296" y="88" width="118" height="72" rx="10" fill="#fff" stroke="#0369a1" stroke-width="2"/>
    <text x="355" y="118" text-anchor="middle">DECIDE</text>
    <text x="355" y="136" text-anchor="middle" fill="#64748b" font-size="7" font-weight="600">Apply, aid, commit</text>
    <rect x="430" y="88" width="118" height="72" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
    <text x="489" y="118" text-anchor="middle">ONBOARD</text>
    <text x="489" y="136" text-anchor="middle" fill="#64748b" font-size="7" font-weight="600">First term, systems</text>
    <rect x="564" y="88" width="118" height="72" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
    <text x="623" y="118" text-anchor="middle">SUCCESS</text>
    <text x="623" y="136" text-anchor="middle" fill="#64748b" font-size="7" font-weight="600">Progress, support, QA</text>
    <rect x="698" y="88" width="118" height="72" rx="10" fill="#fff" stroke="#059669" stroke-width="2"/>
    <text x="757" y="118" text-anchor="middle">GRADUATE</text>
    <text x="757" y="136" text-anchor="middle" fill="#64748b" font-size="7" font-weight="600">Outcome proof</text>
  </g>
  <path d="M146 124h16M280 124h16M414 124h16M548 124h16M682 124h16" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="320" y="200" width="260" height="88" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
  <text x="450" y="232" text-anchor="middle" fill="#047857" font-family="system-ui,sans-serif" font-size="13" font-weight="800">ALUMNI / ADVOCATES</text>
  <text x="450" y="254" text-anchor="middle" fill="#166534" font-family="system-ui,sans-serif" font-size="9">Referrals, hiring, guest talks, donors, social proof</text>
  <text x="450" y="272" text-anchor="middle" fill="#15803d" font-family="system-ui,sans-serif" font-size="8">Marketing infrastructure - not only goodwill</text>
  <path d="M757 160 Q 820 200 820 244 Q 820 280 450 288 Q 80 280 80 244 Q 80 200 146 160" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="820" y="218" fill="#64748b" font-family="system-ui,sans-serif" font-size="8" font-weight="600">loop</text>
  <text x="450" y="318" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="9">Loop: alumni success lowers CAC for next cohort and strengthens employer pipeline</text>
</svg>
