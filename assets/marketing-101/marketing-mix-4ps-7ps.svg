<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 480" role="img" aria-labelledby="t4p">
  <title id="t4p">Marketing mix: 4 Ps plus service extensions for a School of Technology</title>
  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text x="380" y="36" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="18" font-weight="700">Marketing mix (4Ps)</text>
  <text x="380" y="58" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="11">STC / higher-ed examples in each quadrant - extend to 7Ps below</text>
  <g stroke="#cbd5e1" stroke-width="2">
    <line x1="380" y1="78" x2="380" y2="300"/>
    <line x1="60" y1="189" x2="700" y2="189"/>
  </g>
  <rect x="70" y="88" width="300" height="92" rx="10" fill="#fff" stroke="#0369a1" stroke-width="2"/>
  <text x="220" y="118" text-anchor="middle" fill="#0369a1" font-family="system-ui,sans-serif" font-size="14" font-weight="800">PRODUCT</text>
  <text x="220" y="138" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">Degrees, certs, stack, labs, capstone</text>
  <text x="220" y="156" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">What the learner receives</text>
  <rect x="390" y="88" width="300" height="92" rx="10" fill="#fff" stroke="#0d9488" stroke-width="2"/>
  <text x="540" y="118" text-anchor="middle" fill="#0d9488" font-family="system-ui,sans-serif" font-size="14" font-weight="800">PRICE</text>
  <text x="540" y="138" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">Tuition, fees, time, aid, opportunity cost</text>
  <text x="540" y="156" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">Total cost to the student</text>
  <rect x="70" y="198" width="300" height="92" rx="10" fill="#fff" stroke="#7c3aed" stroke-width="2"/>
  <text x="220" y="228" text-anchor="middle" fill="#7c3aed" font-family="system-ui,sans-serif" font-size="14" font-weight="800">PLACE</text>
  <text x="220" y="248" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">Online, hybrid, LMS, partner sites</text>
  <text x="220" y="266" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">Where delivery and support happen</text>
  <rect x="390" y="198" width="300" height="92" rx="10" fill="#fff" stroke="#c2410c" stroke-width="2"/>
  <text x="540" y="228" text-anchor="middle" fill="#c2410c" font-family="system-ui,sans-serif" font-size="14" font-weight="800">PROMOTION</text>
  <text x="540" y="248" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">Web, events, content, ads, PR, advisors</text>
  <text x="540" y="266" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">Visible story and CTAs</text>
  <rect x="60" y="318" width="640" height="140" rx="12" fill="#e0f2fe" stroke="#0369a1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="380" y="348" text-anchor="middle" fill="#0369a1" font-family="system-ui,sans-serif" font-size="12" font-weight="800">SERVICE MIX EXTENSIONS (often called +3Ps)</text>
  <text x="380" y="372" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="10" font-weight="700">PEOPLE</text>
  <text x="380" y="388" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">Faculty, advisors, staff, alumni mentors - trust carriers</text>
  <text x="180" y="418" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="10" font-weight="700">PROCESS</text>
  <text x="180" y="434" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="8">Registration, grading, integrity, support SLAs</text>
  <text x="580" y="418" text-anchor="middle" fill="#334155" font-family="system-ui,sans-serif" font-size="10" font-weight="700">PHYSICAL EVIDENCE</text>
  <text x="580" y="434" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="8">Syllabi, tooling, samples, career artifacts</text>
</svg>
