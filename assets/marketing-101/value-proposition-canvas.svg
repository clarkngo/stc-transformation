<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="tvpc">
  <title id="tvpc">Value proposition canvas: customer profile and value map (School of Technology context)</title>
  <rect width="100%" height="100%" fill="#fafafa"/>
  <text x="460" y="34" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="17" font-weight="700">Value proposition canvas</text>
  <text x="460" y="54" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="10">Customer profile (left) + Value map (right) - seek FIT between sides</text>
  <text x="230" y="82" text-anchor="middle" fill="#0369a1" font-family="system-ui,sans-serif" font-size="11" font-weight="800">CUSTOMER PROFILE</text>
  <text x="690" y="82" text-anchor="middle" fill="#0d9488" font-family="system-ui,sans-serif" font-size="11" font-weight="800">VALUE MAP</text>
  <rect x="40" y="94" width="380" height="110" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <text x="230" y="122" text-anchor="middle" fill="#9a3412" font-family="system-ui,sans-serif" font-size="12" font-weight="800">CUSTOMER GAINS</text>
  <text x="230" y="142" text-anchor="middle" fill="#78716c" font-family="system-ui,sans-serif" font-size="9">Outcomes, credibility, speed-to-hire, flexibility...</text>
  <text x="230" y="160" text-anchor="middle" fill="#a8a29e" font-family="system-ui,sans-serif" font-size="8">What would delight them?</text>
  <rect x="40" y="212" width="380" height="110" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="230" y="240" text-anchor="middle" fill="#991b1b" font-family="system-ui,sans-serif" font-size="12" font-weight="800">CUSTOMER PAINS</text>
  <text x="230" y="260" text-anchor="middle" fill="#78716c" font-family="system-ui,sans-serif" font-size="9">Cost, time risk, unclear pathways, low trust...</text>
  <text x="230" y="278" text-anchor="middle" fill="#a8a29e" font-family="system-ui,sans-serif" font-size="8">Obstacles and bad outcomes?</text>
  <rect x="40" y="330" width="380" height="150" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="230" y="362" text-anchor="middle" fill="#1e40af" font-family="system-ui,sans-serif" font-size="12" font-weight="800">CUSTOMER JOBS-TO-BE-DONE</text>
  <text x="230" y="386" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">Switch careers, level up skills, earn credential,</text>
  <text x="230" y="402" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">hire-ready portfolio, employer-sponsored path...</text>
  <text x="230" y="428" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">Functional, social, emotional jobs</text>
  <rect x="500" y="94" width="380" height="110" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="690" y="122" text-anchor="middle" fill="#047857" font-family="system-ui,sans-serif" font-size="12" font-weight="800">GAIN CREATORS</text>
  <text x="690" y="142" text-anchor="middle" fill="#78716c" font-family="system-ui,sans-serif" font-size="9">Labs, industry projects, credentials, career services...</text>
  <text x="690" y="160" text-anchor="middle" fill="#a8a29e" font-family="system-ui,sans-serif" font-size="8">How you amplify their gains</text>
  <rect x="500" y="212" width="380" height="110" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="690" y="240" text-anchor="middle" fill="#5b21b6" font-family="system-ui,sans-serif" font-size="12" font-weight="800">PAIN RELIEVERS</text>
  <text x="690" y="260" text-anchor="middle" fill="#78716c" font-family="system-ui,sans-serif" font-size="9">Advising, bridge courses, tutoring, clear policies...</text>
  <text x="690" y="278" text-anchor="middle" fill="#a8a29e" font-family="system-ui,sans-serif" font-size="8">How you remove friction and fear</text>
  <rect x="500" y="330" width="380" height="150" rx="8" fill="#fff" stroke="#0f172a" stroke-width="2"/>
  <text x="690" y="362" text-anchor="middle" fill="#0f172a" font-family="system-ui,sans-serif" font-size="12" font-weight="800">PRODUCTS + SERVICES</text>
  <text x="690" y="386" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">Programs, courses, certificates, micro-paths,</text>
  <text x="690" y="402" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="9">community (e.g. guild), employer partnerships...</text>
  <text x="690" y="428" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-size="8">What you actually deliver</text>
  <rect x="438" y="200" width="44" height="180" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="460" y="268" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10" font-weight="800">F</text>
  <text x="460" y="284" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10" font-weight="800">I</text>
  <text x="460" y="300" text-anchor="middle" fill="#475569" font-family="system-ui,sans-serif" font-size="10" font-weight="800">T</text>
  <text x="460" y="498" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-size="9">Competitors on canvas: bootcamps, MOOCs, DIY, status quo - not only other universities</text>
</svg>
